<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f2f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 400px;
    }
    h2 {
      text-align: center;
      margin-bottom: 28px;
      color: #1a1a2e;
      font-size: 26px;
    }
    label {
      display: block;
      margin-bottom: 6px;
      color: #444;
      font-size: 14px;
      font-weight: 600;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #ddd;
      border-radius: 8px;
      font-size: 15px;
      margin-bottom: 18px;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: #4361ee; }
    button {
      width: 100%;
      padding: 13px;
      background: #4361ee;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #3451d1; }
    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
    }
    .msg.error { background: #fdecea; color: #c0392b; }
    .msg.success { background: #eafaf1; color: #1e8449; }
    .footer {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #666;
    }
    .footer a { color: #4361ee; text-decoration: none; font-weight: 600; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h2>🔐 Login</h2>
    <label>Username</label>
    <input type="text" id="username" placeholder="Enter your username" />
    <label>Password</label>
    <input type="password" id="password" placeholder="Enter your password" />
    <button onclick="login()">Login</button>
    <div class="msg" id="msg"></div>
    <div class="footer">
      Don't have an account? <a href="/register-page">Register</a>
    </div>
  </div>

  <script>
    async function login() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const msg = document.getElementById("msg");

      if (!username || !password) {
        showMsg("Please enter both username and password.", "error");
        return;
      }

      const res = await fetch("/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();
      if (data.success) {
        showMsg("Login successful! Redirecting...", "success");
        setTimeout(() => window.location.href = "/dashboard", 800);
      } else {
        showMsg(data.message, "error");
      }
    }

    function showMsg(text, type) {
      const msg = document.getElementById("msg");
      msg.textContent = text;
      msg.className = "msg " + type;
      msg.style.display = "block";
    }

    // Allow Enter key
    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") login();
    });
  </script>
</body>
</html>
