<!DOCTYPE html>
<html>
<head>
    <title>Fire and Water Logic</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        body {
            background: #222;
            color: white;
            font-family: Arial;
            text-align: center;
            overflow: hidden;
        }

        /* Fire */
        #fire {
            width: 80px;
            height: 140px;
            margin: 80px auto;
            position: relative;
            animation: flicker 0.15s infinite alternate;
        }

        .flame {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            border-radius: 50% 50% 40% 40%;
            background: radial-gradient(circle at 50% 80%, yellow, orange, red);
            animation: flameMove 0.3s infinite alternate;
        }

        .flame.small {
            width: 60%;
            height: 60%;
            left: 20%;
        }

        @keyframes flameMove {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }

        @keyframes flicker {
            from { transform: rotate(-1deg); }
            to { transform: rotate(1deg); }
        }

        /* Water */
        .water {
            width: 12px;
            height: 18px;
            background: linear-gradient(to bottom, #b3e5fc, #0288d1);
            position: absolute;
            top: 0;
            border-radius: 50%;
        }

        .splash {
            width: 20px;
            height: 10px;
            background: #81d4fa;
            position: absolute;
            border-radius: 50%;
            opacity: 0.7;
        }

        /* Button area (fixed position) */
        #controls {
            position: fixed;
            bottom: 20px;
            width: 100%;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h2>🔥 Fire & 💧 Water</h2>

<div id="fire">
    <div class="flame"></div>
    <div class="flame small"></div>
</div>

<div id="controls">
    <button id="waterBtn">Splash Water</button>
    <button id="fireBtn" style="display:none;">Blow Fire</button>
</div>

<script>
      let fireOn = true;

      $("#waterBtn").click(function () {
    if (!fireOn) return;

    dropWater();

    $("#fire").fadeOut(700);
    fireOn = false;

    $("#waterBtn").hide();
    $("#fireBtn").show();
});


$("#fireBtn").click(function () {
    $("#fire").fadeIn(600);
    fireOn = true;

    $("#fireBtn").hide();
    $("#waterBtn").show();
});
function dropWater() {

    let firePos = $("#fire").offset();
    let fireWidth = $("#fire").outerWidth();
    let dropCount = 10;

    for (let i = 0; i < dropCount; i++) {

        let spread = fireWidth + 60;
        let left = firePos.left - 30 + Math.random() * spread;

        let water = $("<div class='water'></div>");
        $("body").append(water);

        water.css({
            left: left + "px",
            top: "0px"
        });

        water.animate({
            top: firePos.top + 120
        }, 600, function () {

            let splash = $("<div class='splash'></div>");
            $("body").append(splash);

            splash.css({
                left: left + "px",
                top: firePos.top + 130
            });

            splash.animate({
                width: "40px",
                opacity: 0
            }, 300, function () {
                splash.remove();
            });

            water.remove();
        });
    }
}

</script>

</body>
</html>
